<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>스피드 카드 분류 게임</title>
<style>
    /* 기본 설정: 모바일 화면에서 스크롤 방지 */
    body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        font-family: 'Pretendard', sans-serif;
        background-color: #f8f9fa;
        touch-action: none; /* 드래그 시 화면 스크롤 방지 */
    }

    /* 게임 전체 컨테이너 */
    #game-container {
        position: relative;
        width: 100vw;
        height: 100vh;
        display: flex;
        flex-direction: column;
    }

    /* 상단 UI (타이머 & 점수) */
    #header {
        padding: 15px 20px;
        background: #212529;
        color: white;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        z-index: 10;
    }

    /* 줄어드는 타이머 바 (모래시계 컨셉) */
    #timer-bg {
        width: 100%;
        height: 15px;
        background: #495057;
        border-radius: 10px;
        overflow: hidden;
        margin-bottom: 10px;
    }
    
    #timer-bar {
        width: 100%;
        height: 100%;
        background: #20c997; /* 기본 초록색 */
        transition: width 0.1s linear, background-color 0.3s ease;
    }

    #stats {
        display: flex;
        justify-content: space-between;
        font-size: 1.2rem;
        font-weight: 700;
    }

    /* 게임 보드 영역 */
    #board {
        flex: 1;
        position: relative;
    }

    /* 드롭 구역 (상하좌우) */
    .zone {
        position: absolute;
        width: 100px;
        height: 130px;
        border: 4px dashed;
        border-radius: 12px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-weight: bold;
        font-size: 1.2rem;
        opacity: 0.6;
        background: rgba(255, 255, 255, 0.5);
    }

    #zone-red { top: 20px; left: 50%; transform: translateX(-50%); border-color: #fa5252; color: #fa5252; }
    #zone-yellow { bottom: 20px; left: 50%; transform: translateX(-50%); border-color: #fcc419; color: #fcc419; }
    #zone-blue { top: 50%; left: 20px; transform: translateY(-50%); border-color: #339af0; color: #339af0; }
    #zone-purple { top: 50%; right: 20px; transform: translateY(-50%); border-color: #be4bdb; color: #be4bdb; }

    /* 중앙 카드 덱 */
    #deck-container {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 100px;
        height: 140px;
    }

    /* 개별 카드 */
    .card {
        position: absolute;
        width: 100px;
        height: 140px;
        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        cursor: grab;
        transition: transform 0.2s ease;
    }

    .card.dragging {
        cursor: grabbing;
        transition: none; /* 드래그 중에는 부드러운 애니메이션 끔 */
        z-index: 100 !important;
        box-shadow: 0 10px 20px rgba(0,0,0,0.5);
    }

    /* 카드 색상 */
    .bg-red { background-color: #fa5252; }
    .bg-yellow { background-color: #fcc419; }
    .bg-blue { background-color: #339af0; }
    .bg-purple { background-color: #be4bdb; }

    /* 시작/종료 오버레이 화면 */
    #overlay {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.85);
        color: white;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 200;
        text-align: center;
    }

    h1 { margin-bottom: 10px; }
    p { margin-bottom: 30px; font-size: 1.2rem; color: #ced4da; }
    
    button {
        padding: 15px 40px;
        font-size: 1.5rem;
        font-weight: bold;
        cursor: pointer;
        border: none;
        border-radius: 8px;
        background: #20c997;
        color: white;
        box-shadow: 0 4px 0 #12b886;
        transition: transform 0.1s;
    }
    button:active {
        transform: translateY(4px);
        box-shadow: none;
    }
</style>
</head>
<body>

<div id="game-container">
    <div id="header">
        <div id="timer-bg">
            <div id="timer-bar"></div>
        </div>
        <div id="stats">
            <span id="score-display">현재 점수: 0</span>
            <span id="max-score-display">최고 기록: 0</span>
        </div>
    </div>

    <div id="board">
        <div class="zone" id="zone-red" data-color="red">빨강 (위)</div>
        <div class="zone" id="zone-blue" data-color="blue">파랑 (좌)</div>
        <div class="zone" id="zone-yellow" data-color="yellow">노랑 (아래)</div>
        <div class="zone" id="zone-purple" data-color="purple">보라 (우)</div>

        <div id="deck-container"></div>
    </div>
</div>

<div id="overlay">
    <h1 id="overlay-title">스피드 카드 분류</h1>
    <p id="overlay-desc">같은 색상의 박스로 카드를 드래그하세요.<br>틀리면 즉시 탈락합니다!</p>
    <button onclick="startGame()">게임 시작 (30초)</button>
</div>

<script>
    const colors = ['red', 'yellow', 'blue', 'purple'];
    let deck = [];
    let score = 0;
    let maxScore = localStorage.getItem('cardGameMaxScore') || 0;
    let timeLeft = 30; // 30초로 변경
    let timerInterval;
    let isPlaying = false;

    // 초기 최고 기록 표시
    document.getElementById('max-score-display').innerText = `최고 기록: ${maxScore}`;

    function randomColor() {
        return colors[Math.floor(Math.random() * colors.length)];
    }

    function startGame() {
        document.getElementById('overlay').style.display = 'none';
        score = 0;
        timeLeft = 30; // 30초로 변경
        isPlaying = true;
        
        // 덱 초기화
        deck = Array.from({length: 10}, () => randomColor());
        
        updateStats();
        renderDeck();

        // 30초 타이머 시작 (부드러운 게이지바를 위해 0.1초마다 갱신)
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft -= 0.1;
            updateTimerBar();
            if (timeLeft <= 0) {
                endGame(true); // 타임 오버
            }
        }, 100);
    }

    function updateTimerBar() {
        const bar = document.getElementById('timer-bar');
        // 30초 기준으로 퍼센트 계산 변경
        const percentage = Math.max(0, (timeLeft / 30) * 100);
        bar.style.width = percentage + '%';

        // 시간에 따른 색상 변화
        if (percentage <= 20) {
            bar.style.backgroundColor = '#fa5252'; // 빨강
        } else if (percentage <= 50) {
            bar.style.backgroundColor = '#fd7e14'; // 주황
        } else {
            bar.style.backgroundColor = '#20c997'; // 초록
        }
    }

    function updateStats() {
        document.getElementById('score-display').innerText = `현재 점수: ${score}`;
        document.getElementById('max-score-display').innerText = `최고 기록: ${maxScore}`;
    }

    function renderDeck() {
        const container = document.getElementById('deck-container');
        container.innerHTML = '';

        // 최대 4장 렌더링 (현재 1장 + 다음 카드 3장)
        const cardsToShow = Math.min(4, deck.length);
        
        for (let i = cardsToShow - 1; i >= 0; i--) {
            const cardColor = deck[i];
            const cardEl = document.createElement('div');
            cardEl.className = `card bg-${cardColor}`;
            
            cardEl.style.transform = `translate(${i * 6}px, ${i * 6}px)`;
            cardEl.style.zIndex = 10 - i;

            if (i === 0) {
                makeDraggable(cardEl);
            }
            container.appendChild(cardEl);
        }
    }

    function makeDraggable(el) {
        let startX = 0, startY = 0, currentX = 0, currentY = 0;

        el.addEventListener('pointerdown', dragStart);

        function dragStart(e) {
            if (!isPlaying) return;
            e.preventDefault();
            
            startX = e.clientX;
            startY = e.clientY;
            
            el.classList.add('dragging');
            
            document.addEventListener('pointermove', dragMove);
            document.addEventListener('pointerup', dragEnd);
        }

        function dragMove(e) {
            e.preventDefault();
            currentX = e.clientX - startX;
            currentY = e.clientY - startY;
            
            const rotation = currentX * 0.05;
            el.style.transform = `translate(${currentX}px, ${currentY}px) rotate(${rotation}deg)`;
        }

        function dragEnd(e) {
            document.removeEventListener('pointermove', dragMove);
            document.removeEventListener('pointerup', dragEnd);
            el.classList.remove('dragging');

            checkDrop(el);
        }
    }

    function checkDrop(cardEl) {
        const cardRect = cardEl.getBoundingClientRect();
        const centerX = cardRect.left + cardRect.width / 2;
        const centerY = cardRect.top + cardRect.height / 2;

        const zones = document.querySelectorAll('.zone');
        let targetZone = null;

        zones.forEach(zone => {
            const rect = zone.getBoundingClientRect();
            if (centerX >= rect.left && centerX <= rect.right &&
                centerY >= rect.top && centerY <= rect.bottom) {
                targetZone = zone;
            }
        });

        if (targetZone) {
            const targetColor = targetZone.getAttribute('data-color');
            const cardColor = deck[0];

            if (targetColor === cardColor) {
                score++;
                deck.shift();
                deck.push(randomColor());
                updateStats();
                renderDeck();
            } else {
                endGame(false);
            }
        } else {
            cardEl.style.transform = 'translate(0px, 0px) rotate(0deg)';
        }
    }

    function endGame(isTimeUp) {
        isPlaying = false;
        clearInterval(timerInterval);

        if (score > maxScore) {
            maxScore = score;
            localStorage.setItem('cardGameMaxScore', maxScore);
        }

        const overlay = document.getElementById('overlay');
        overlay.style.display = 'flex';
        
        document.getElementById('overlay-title').innerText = isTimeUp ? '⏳ 타임 오버!' : '💀 색상 불일치! 탈락!';
        document.getElementById('overlay-desc').innerText = `최종 점수: ${score}점\n최고 기록: ${maxScore}점`;
    }
</script>

</body>
</html>
